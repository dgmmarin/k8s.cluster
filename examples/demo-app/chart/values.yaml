replicaCount: 1

image:
  repository: traefik/whoami
  tag: v1.11.0

containerPort: 80

host: demo.k8s.bitulzero.ro
# Validate new hosts against letsencrypt-staging first (rate limits!),
# then switch to letsencrypt-prod.
clusterIssuer: letsencrypt-staging

# Required on this cluster: every workload must declare requests/limits.
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 64Mi
