# Local cluster mirroring the production k3s setup (mise run local-up).
# k3s inside Docker: traefik disabled (like the Hetzner node), host ports
# 80/443 published so ingress-nginx is reachable at https://localhost.
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: k8s-local
servers: 1
agents: 0
ports:
  - port: 80:80
    nodeFilters: [loadbalancer]
  - port: 443:443
    nodeFilters: [loadbalancer]
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters: [server:*]
  kubeconfig:
    updateDefaultKubeconfig: false
    switchCurrentContext: false
