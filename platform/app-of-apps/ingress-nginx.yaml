# Wave 0: the argocd app's own Ingress (also wave 0) only reports Healthy
# once an ingress controller assigns it an address — nginx must not wait
# behind it. The ServiceMonitor race with prometheus-operator-crds (same
# wave) is absorbed by the sync retry.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.15.1
      helm:
        valueFiles:
          - $values/platform/ingress-nginx/values.yaml
    - repoURL: https://github.com/dgmmarin/k8s.cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
