# ArgoCD manages itself: same chart version + release name as the manual
# bootstrap install, so it adopts that release. Upgrades happen via git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 10.1.2 # keep in sync with scripts/bootstrap-argocd.sh
      helm:
        releaseName: argocd
        valueFiles:
          - $values/platform/argocd/values.yaml
    - repoURL: https://github.com/dgmmarin/k8s.cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
