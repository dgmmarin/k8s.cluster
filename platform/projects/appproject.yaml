# Guardrails for all product projects:
# - sources restricted to the GitHub org
# - platform namespaces are off-limits
# - no cluster-scoped resources (CRDs, ClusterRoles...) from project repos
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: projects
  namespace: argocd
spec:
  description: Product applications — one namespace per project
  sourceRepos:
    - https://github.com/dgmmarin/*
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
    - server: https://kubernetes.default.svc
      namespace: "!kube-system"
    - server: https://kubernetes.default.svc
      namespace: "!argocd"
    - server: https://kubernetes.default.svc
      namespace: "!cert-manager"
    - server: https://kubernetes.default.svc
      namespace: "!ingress-nginx"
    - server: https://kubernetes.default.svc
      namespace: "!monitoring"
  # Intentionally no clusterResourceWhitelist: namespace-scoped resources only.
