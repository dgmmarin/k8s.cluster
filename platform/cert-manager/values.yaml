crds:
  enabled: true

prometheus:
  enabled: true
  servicemonitor:
    enabled: true # CRD provided by the prometheus-operator-crds app (wave 0)

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

cainjector:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi
