# Loki in single-binary mode with filesystem storage — sized for one node.
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 168h # 7 days
  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 15Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 640Mi

# CRITICAL on an 8 GB node: the chart's default caches are memcached
# instances sized in GBs and will wedge the node instantly.
chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false # clients talk to loki:3100 directly; one less pod
lokiCanary:
  enabled: false
test:
  enabled: false

monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# Zero out the scalable-mode deployments (SingleBinary handles everything).
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
