---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - unattended-upgrades
      - curl
    state: present

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Disable SSH password authentication (main config)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: Restart sshd

# Cloud images (netcup's Debian, Hetzner's Ubuntu, etc.) often ship a
# /etc/ssh/sshd_config.d/*-cloud-init.conf that re-enables password auth. It's
# Include'd near the top of sshd_config, so it overrides the main file. A 00-
# drop-in sorts first, and sshd uses the first obtained value per keyword —
# so this reliably wins regardless of what cloud-init dropped in.
- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: "0755"

- name: Disable SSH password authentication (drop-in, overrides cloud-init)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-disable-password-auth.conf
    content: "PasswordAuthentication no\n"
    mode: "0644"
  notify: Restart sshd

- name: Configure sysctl for Kubernetes workloads
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    content: |
      fs.inotify.max_user_instances = 8192
      fs.inotify.max_user_watches = 524288
    mode: "0644"
  notify: Reload sysctl

# Host firewall — only for bring-your-own VPS providers (e.g. netcup) that
# have no cloud firewall API. On Hetzner this stays off (host_firewall is
# false) because the hetzner.hcloud.firewall in 01-provision.yml covers it.
# Allow rules are added BEFORE enabling ufw so the live SSH session survives.
- name: Configure host firewall (ufw)
  when: host_firewall | default(false) | bool
  tags: [firewall]
  block:
    - name: Install ufw
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Require an admin IP for the firewall
      ansible.builtin.assert:
        that: admin_ip | default('') | length > 0
        fail_msg: >-
          host_firewall is on but admin_ip is empty. Set ADMIN_IP in .env
          or let the netcup playbook auto-detect your current public IP.

    - name: Allow SSH from the admin IP only
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        from_ip: "{{ admin_ip }}"

    - name: Allow the Kubernetes API from the admin IP only
      community.general.ufw:
        rule: allow
        port: "6443"
        proto: tcp
        from_ip: "{{ admin_ip }}"

    - name: Allow HTTP from anywhere
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS from anywhere
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Enable ufw with default-deny incoming
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming
