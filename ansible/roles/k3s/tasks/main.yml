---
- name: Create k3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Template k3s server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"

- name: Get installed k3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_installed
  changed_when: false
  failed_when: false

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /root/k3s-install.sh
    mode: "0755"
  when: k3s_version not in (k3s_installed.stdout | default(''))

- name: Install or upgrade k3s
  ansible.builtin.command: /root/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
  when: k3s_version not in (k3s_installed.stdout | default(''))

- name: Wait for node to be Ready
  ansible.builtin.command: >-
    /usr/local/bin/k3s kubectl wait --for=condition=Ready node --all --timeout=60s
  register: node_ready
  retries: 10
  delay: 15
  until: node_ready.rc == 0
  changed_when: false

- name: Fetch kubeconfig to repo root
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ playbook_dir }}/../../kubeconfig"
    flat: true
  tags: [kubeconfig]

- name: Point kubeconfig at the node's public IP
  ansible.builtin.replace:
    path: "{{ playbook_dir }}/../../kubeconfig"
    regexp: '127\.0\.0\.1'
    replace: "{{ ansible_host }}"
  delegate_to: localhost
  become: false
  tags: [kubeconfig]

- name: Restrict kubeconfig permissions
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../../kubeconfig"
    mode: "0600"
  delegate_to: localhost
  become: false
  tags: [kubeconfig]
