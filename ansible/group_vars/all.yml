---
# All values are read from environment variables (see .env.example at the
# repo root) with the defaults below. The Makefile exports .env automatically.
#
# Auth: HCLOUD_TOKEN env var (picked up natively by the hetzner.hcloud modules).

# ── Hetzner Cloud ────────────────────────────────────────────────────────────
hcloud_server_name: "{{ lookup('env', 'HCLOUD_SERVER_NAME') | default('k3s-1', true) }}"
hcloud_server_type: "{{ lookup('env', 'HCLOUD_SERVER_TYPE') | default('cpx31', true) }}"
hcloud_location: "{{ lookup('env', 'HCLOUD_LOCATION') | default('nbg1', true) }}"
hcloud_image: "{{ lookup('env', 'HCLOUD_IMAGE') | default('ubuntu-24.04', true) }}"
hcloud_firewall_name: k3s-firewall
hcloud_ssh_key_name: k3s-admin
ssh_public_key_file: "{{ lookup('env', 'SSH_PUBLIC_KEY_FILE') | default(lookup('env', 'HOME') ~ '/.ssh/id_ed25519.pub', true) }}"

# Allowlisted IP for SSH (22) and kube-api (6443). Empty = auto-detect the
# current public IP at run time (dynamic-IP friendly: `make firewall`).
admin_ip: "{{ lookup('env', 'ADMIN_IP') | default('', true) }}"

# ── Bring-your-own VPS (e.g. netcup) ───────────────────────────────────────────
# Public IP of an existing server. Only used by the netcup/BYO playbooks
# (01-provision-netcup.yml); the Hetzner playbook derives the IP from the API.
server_ip: "{{ lookup('env', 'SERVER_IP') | default('', true) }}"

# ── k3s ──────────────────────────────────────────────────────────────────────
k3s_version: "{{ lookup('env', 'K3S_VERSION') | default('v1.36.2+k3s1', true) }}"

# ── DNS ──────────────────────────────────────────────────────────────────────
# Base domain: every service is exposed as <name>.<domain> via a wildcard
# A record. NOTE: only used for provisioning output — the actual hostnames
# live in the GitOps values files (platform/*/values.yaml), committed in git.
domain: "{{ lookup('env', 'DOMAIN') | default('k8s.bitulzero.ro', true) }}"
